<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexFinance — Premium Personal Finance Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration for Customs -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
            },
            accent: {
              slate: '#0f172a',
              cardDark: '#18181b',
              borderDark: '#27272a',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'scan': 'scan 2s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            scan: {
              '0%': { top: '0%' },
              '50%': { top: '100%' },
              '100%': { top: '0%' }
            }
          }
        }
      }
    }
  </script>

  <!-- React and Chart.js CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }
    
    /* Neon Glows */
    .glow-green {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
    }
    .glow-red {
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.15);
    }
    .glow-brand {
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
    }
    .glassmorphism {
      backdrop-filter: blur(12px);
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .dark .glassmorphism {
      background-color: rgba(24, 24, 27, 0.7);
      border: 1px solid rgba(63, 63, 70, 0.4);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans transition-colors duration-300">
  
  <div id="root"></div>

  <!-- React code with Babel compiler -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- MOCK INITIAL DATA ---
    const INITIAL_USERS = [
      { id: '1', email: 'user@finance.com', name: 'Pragati Gupta', role: 'user', currency: 'USD', familyMembers: ['Self', 'Partner', 'Child'] },
      { id: '2', email: 'admin@finance.com', name: 'System Admin', role: 'admin', currency: 'USD', familyMembers: ['Self'] }
    ];

    const DEFAULT_CATEGORIES = [
      { id: 'cat-1', name: 'Grocery', icon: 'shopping-bag', color: '#10b981' },
      { id: 'cat-2', name: 'Bills', icon: 'credit-card', color: '#3b82f6' },
      { id: 'cat-3', name: 'Personal', icon: 'user', color: '#8b5cf6' },
      { id: 'cat-4', name: 'Travel', icon: 'map-pin', color: '#f59e0b' },
      { id: 'cat-5', name: 'Shopping', icon: 'tag', color: '#ec4899' },
      { id: 'cat-6', name: 'Medical', icon: 'activity', color: '#ef4444' },
      { id: 'cat-7', name: 'Education', icon: 'book-open', color: '#6366f1' },
      { id: 'cat-8', name: 'Entertainment', icon: 'film', color: '#a855f7' },
      { id: 'cat-9', name: 'Investments', icon: 'trending-up', color: '#06b6d4' },
      { id: 'cat-10', name: 'Other', icon: 'help-circle', color: '#71717a' }
    ];

    const INITIAL_TRANSACTIONS = [
      { id: 't-1', userId: '1', type: 'income', amount: 5000, categoryId: 'cat-3', date: '2026-06-01', notes: 'Monthly Main Salary', familyMember: 'Self', isRecurring: true, frequency: 'monthly', tags: ['Salary', 'Primary'] },
      { id: 't-2', userId: '1', type: 'income', amount: 850, categoryId: 'cat-9', date: '2026-06-05', notes: 'Stock Dividends', familyMember: 'Self', isRecurring: false, frequency: 'none', tags: ['Investments'] },
      { id: 't-3', userId: '1', type: 'expense', amount: 280, categoryId: 'cat-1', date: '2026-06-10', notes: 'Weekly grocery run at Whole Foods', familyMember: 'Partner', isRecurring: false, frequency: 'none', tags: ['Food'] },
      { id: 't-4', userId: '1', type: 'expense', amount: 150, categoryId: 'cat-2', date: '2026-06-12', notes: 'Electricity bill payment', familyMember: 'Self', isRecurring: true, frequency: 'monthly', tags: ['Bills'] },
      { id: 't-5', userId: '1', type: 'expense', amount: 90, categoryId: 'cat-5', date: '2026-06-14', notes: 'Running shoes from Nike', familyMember: 'Self', isRecurring: false, frequency: 'none', tags: ['Gear'] },
      { id: 't-6', userId: '1', type: 'expense', amount: 450, categoryId: 'cat-4', date: '2026-06-15', notes: 'Weekend flight booking', familyMember: 'Self', isRecurring: false, frequency: 'none', tags: ['Travel', 'Weekend'] },
      { id: 't-7', userId: '1', type: 'expense', amount: 120, categoryId: 'cat-8', date: '2026-06-17', notes: 'Premium Concert ticket', familyMember: 'Child', isRecurring: false, frequency: 'none', tags: ['Music'] },
      { id: 't-8', userId: '1', type: 'expense', amount: 75, categoryId: 'cat-6', date: '2026-06-18', notes: 'Pharmacy prescription refill', familyMember: 'Self', isRecurring: false, frequency: 'none', tags: ['Health'] }
    ];

    const INITIAL_BUDGETS = [
      { id: 'b-1', userId: '1', categoryId: 'cat-1', limitAmount: 400 },
      { id: 'b-2', userId: '1', categoryId: 'cat-2', limitAmount: 300 },
      { id: 'b-3', userId: '1', categoryId: 'cat-5', limitAmount: 200 },
      { id: 'b-4', userId: '1', categoryId: 'cat-8', limitAmount: 150 }
    ];

    const INITIAL_LOANS = [
      { id: 'l-1', userId: '1', type: 'lend', personName: 'Sarah Jenkins', amount: 350, dueDate: '2026-06-25', notes: 'Shared Airbnb expenses', status: 'pending' },
      { id: 'l-2', userId: '1', type: 'borrow', personName: 'Robert Dow', amount: 120, dueDate: '2026-06-15', notes: 'Dinner bill split', status: 'overdue' },
      { id: 'l-3', userId: '1', type: 'lend', personName: 'Sam K.', amount: 500, dueDate: '2026-06-10', notes: 'Laptop loan helper', status: 'paid' }
    ];

    const DEFAULT_CMS_SETTINGS = {
      enableBiometrics: true,
      enableBorrowLend: true,
      enableRecurring: true,
      enableExport: true,
      dashboardBannerText: '🎉 Welcome to ApexFinance Admin Controlled Portal. Manage your parameters on the CMS panel!',
      showDashboardBanner: true,
      currencies: [
        { code: 'USD', symbol: '$', rate: 1.0, format: 'en-US' },
        { code: 'EUR', symbol: '€', rate: 0.92, format: 'de-DE' },
        { code: 'GBP', symbol: '£', rate: 0.79, format: 'en-GB' },
        { code: 'INR', symbol: '₹', rate: 83.5, format: 'en-IN' },
        { code: 'JPY', symbol: '¥', rate: 155.2, format: 'ja-JP' }
      ]
    };

    // --- REACT APP COMPONENT ---
    function App() {
      // States
      const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem('apex_users')) || INITIAL_USERS);
      const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('apex_current_user')) || null);
      const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('apex_categories')) || DEFAULT_CATEGORIES);
      const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('apex_transactions')) || INITIAL_TRANSACTIONS);
      const [budgets, setBudgets] = useState(() => JSON.parse(localStorage.getItem('apex_budgets')) || INITIAL_BUDGETS);
      const [loans, setLoans] = useState(() => JSON.parse(localStorage.getItem('apex_loans')) || INITIAL_LOANS);
      const [cmsSettings, setCmsSettings] = useState(() => JSON.parse(localStorage.getItem('apex_cms_settings')) || DEFAULT_CMS_SETTINGS);
      const [theme, setTheme] = useState(() => localStorage.getItem('apex_theme') || 'dark');
      const [currentView, setCurrentView] = useState('landing'); // landing, login, signup, forgot, biometric, dashboard, etc.
      
      // UI Modals / Helper states
      const [isNotificationOpen, setIsNotificationOpen] = useState(false);
      const [notifications, setNotifications] = useState([]);
      const [currencyCode, setCurrencyCode] = useState('USD');
      const [showAddTransactionModal, setShowAddTransactionModal] = useState(false);
      const [showAddBudgetModal, setShowAddBudgetModal] = useState(false);
      const [showAddLoanModal, setShowAddLoanModal] = useState(false);
      const [showPrintModal, setShowPrintModal] = useState(false);
      
      // Face ID Scanner simulation
      const [scanState, setScanState] = useState('idle'); // idle, scanning, success, error

      // Synchronize state with LocalStorage
      useEffect(() => {
        localStorage.setItem('apex_users', JSON.stringify(users));
      }, [users]);
      useEffect(() => {
        localStorage.setItem('apex_current_user', JSON.stringify(currentUser));
        if (currentUser) {
          setCurrencyCode(currentUser.currency || 'USD');
        }
      }, [currentUser]);
      useEffect(() => {
        localStorage.setItem('apex_categories', JSON.stringify(categories));
      }, [categories]);
      useEffect(() => {
        localStorage.setItem('apex_transactions', JSON.stringify(transactions));
      }, [transactions]);
      useEffect(() => {
        localStorage.setItem('apex_budgets', JSON.stringify(budgets));
      }, [budgets]);
      useEffect(() => {
        localStorage.setItem('apex_loans', JSON.stringify(loans));
      }, [loans]);
      useEffect(() => {
        localStorage.setItem('apex_cms_settings', JSON.stringify(cmsSettings));
      }, [cmsSettings]);
      useEffect(() => {
        localStorage.setItem('apex_theme', theme);
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.body.classList.remove('bg-zinc-50', 'text-zinc-900');
          document.body.classList.add('bg-zinc-950', 'text-zinc-100');
        } else {
          document.documentElement.classList.remove('dark');
          document.body.classList.remove('bg-zinc-950', 'text-zinc-100');
          document.body.classList.add('bg-zinc-50', 'text-zinc-900');
        }
      }, [theme]);

      // Dynamic currency calculation
      const currentCurrency = useMemo(() => {
        return cmsSettings.currencies.find(c => c.code === currencyCode) || { code: 'USD', symbol: '$', rate: 1.0, format: 'en-US' };
      }, [currencyCode, cmsSettings]);

      const formatVal = (amountUSD) => {
        const converted = amountUSD * currentCurrency.rate;
        return new Intl.NumberFormat(currentCurrency.format, {
          style: 'currency',
          currency: currentCurrency.code,
        }).format(converted);
      };

      // Realtime notification generator based on budget limits and overdue loans
      useEffect(() => {
        if (!currentUser) return;
        const newAlerts = [];
        
        // Check budgets
        budgets.forEach(budget => {
          if (budget.userId !== currentUser.id) return;
          const category = categories.find(c => c.id === budget.categoryId);
          if (!category) return;
          
          const totalSpent = transactions
            .filter(t => t.userId === currentUser.id && t.type === 'expense' && t.categoryId === budget.categoryId)
            .reduce((sum, t) => sum + t.amount, 0);
          
          const percentage = (totalSpent / budget.limitAmount) * 100;
          if (percentage >= 100) {
            newAlerts.push({
              id: `b-alert-100-${budget.id}`,
              type: 'critical',
              title: `Budget Limit Exceeded: ${category.name}`,
              message: `You spent ${formatVal(totalSpent)} out of ${formatVal(budget.limitAmount)} (${percentage.toFixed(0)}%)`
            });
          } else if (percentage >= 90) {
            newAlerts.push({
              id: `b-alert-90-${budget.id}`,
              type: 'warning',
              title: `Budget Warning (90%): ${category.name}`,
              message: `You spent ${formatVal(totalSpent)} out of ${formatVal(budget.limitAmount)}`
            });
          } else if (percentage >= 80) {
            newAlerts.push({
              id: `b-alert-80-${budget.id}`,
              type: 'info',
              title: `Budget Notice (80%): ${category.name}`,
              message: `Approaching limit. Spent ${formatVal(totalSpent)} of ${formatVal(budget.limitAmount)}`
            });
          }
        });

        // Check overdue loans
        loans.forEach(loan => {
          if (loan.userId !== currentUser.id) return;
          if (loan.status === 'pending') {
            const isOverdue = new Date(loan.dueDate) < new Date();
            if (isOverdue) {
              newAlerts.push({
                id: `l-overdue-${loan.id}`,
                type: 'critical',
                title: `Overdue Loan Reminder`,
                message: `${loan.type === 'borrow' ? 'Repayment to' : 'Collection from'} ${loan.personName} of ${formatVal(loan.amount)} was due on ${loan.dueDate}.`
              });
            }
          }
        });

        setNotifications(newAlerts);
      }, [transactions, budgets, loans, categories, currentUser, currencyCode]);

      // Main dashboard statistics
      const stats = useMemo(() => {
        if (!currentUser) return { income: 0, expenses: 0, savings: 0, borrow: 0, lend: 0, savingsPercent: 0 };
        
        const userT = transactions.filter(t => t.userId === currentUser.id);
        const income = userT.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
        const expenses = userT.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
        const savings = income - expenses;
        const savingsPercent = income > 0 ? (savings / income) * 100 : 0;
        
        const userL = loans.filter(l => l.userId === currentUser.id && l.status !== 'paid');
        const borrow = userL.filter(l => l.type === 'borrow').reduce((sum, l) => sum + l.amount, 0);
        const lend = userL.filter(l => l.type === 'lend').reduce((sum, l) => sum + l.amount, 0);

        return { income, expenses, savings, borrow, lend, savingsPercent };
      }, [transactions, loans, currentUser]);

      // Dynamic Theme Switcher
      const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

      // Biometrics Simulation Trigger
      const runBiometricScan = () => {
        setScanState('scanning');
        setTimeout(() => {
          // Success case
          setScanState('success');
          setTimeout(() => {
            const demoUser = users.find(u => u.role === 'user');
            setCurrentUser(demoUser);
            setCurrentView('dashboard');
            setScanState('idle');
          }, 1200);
        }, 2200);
      };

      // Form Handling Mock Methods
      const handleLogin = (e) => {
        e.preventDefault();
        const email = e.target.email.value;
        const password = e.target.password.value;
        
        const foundUser = users.find(u => u.email === email);
        if (foundUser) {
          setCurrentUser(foundUser);
          if (foundUser.role === 'admin') {
            setCurrentView('admin-cms');
          } else {
            setCurrentView('dashboard');
          }
        } else {
          alert('Invalid email or password. Use: user@finance.com / admin@finance.com');
        }
      };

      const handleAddTransaction = (e) => {
        e.preventDefault();
        const type = e.target.type.value;
        const amount = parseFloat(e.target.amount.value);
        const categoryId = e.target.categoryId.value;
        const date = e.target.date.value;
        const notes = e.target.notes.value;
        const familyMember = e.target.familyMember.value;
        const isRecurring = e.target.isRecurring?.checked || false;
        const frequency = isRecurring ? e.target.frequency.value : 'none';
        const tags = e.target.tags.value.split(',').map(t => t.trim()).filter(t => t.length > 0);

        const newT = {
          id: `t-${Date.now()}`,
          userId: currentUser.id,
          type,
          amount,
          categoryId,
          date,
          notes,
          familyMember,
          isRecurring,
          frequency,
          tags
        };

        setTransactions([newT, ...transactions]);
        setShowAddTransactionModal(false);
      };

      const handleAddBudget = (e) => {
        e.preventDefault();
        const categoryId = e.target.categoryId.value;
        const limitAmount = parseFloat(e.target.limitAmount.value);

        // Check if budget already exists for this category
        const existingIndex = budgets.findIndex(b => b.userId === currentUser.id && b.categoryId === categoryId);
        if (existingIndex > -1) {
          const updated = [...budgets];
          updated[existingIndex].limitAmount = limitAmount;
          setBudgets(updated);
        } else {
          const newB = {
            id: `b-${Date.now()}`,
            userId: currentUser.id,
            categoryId,
            limitAmount
          };
          setBudgets([...budgets, newB]);
        }
        setShowAddBudgetModal(false);
      };

      const handleAddLoan = (e) => {
        e.preventDefault();
        const type = e.target.type.value;
        const personName = e.target.personName.value;
        const amount = parseFloat(e.target.amount.value);
        const dueDate = e.target.dueDate.value;
        const notes = e.target.notes.value;

        const newL = {
          id: `l-${Date.now()}`,
          userId: currentUser.id,
          type,
          personName,
          amount,
          dueDate,
          notes,
          status: 'pending'
        };

        setLoans([newL, ...loans]);
        setShowAddLoanModal(false);
      };

      const exportToExcel = () => {
        if (!currentUser) return;
        const userT = transactions.filter(t => t.userId === currentUser.id);
        
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "ID,Type,Amount (USD),Category,Date,Family Member,Notes,Tags,Recurring\n";
        
        userT.forEach(t => {
          const cat = categories.find(c => c.id === t.categoryId)?.name || 'Other';
          const tagStr = t.tags ? t.tags.join(';') : '';
          csvContent += `"${t.id}","${t.type}",${t.amount},"${cat}","${t.date}","${t.familyMember}","${t.notes}","${tagStr}","${t.isRecurring ? t.frequency : 'no'}"\n`;
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `apexfinance_report_${currentUser.name.replace(' ', '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // --- CHART RENDER ENGINE ---
      const chartRef = useRef(null);
      const chartInstanceRef = useRef(null);

      useEffect(() => {
        if (chartRef.current && (currentView === 'dashboard' || currentView === 'expenses')) {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
          }

          const ctx = chartRef.current.getContext('2d');
          const userT = transactions.filter(t => t.userId === currentUser.id);
          
          // Group by category for visual graph
          const categoriesSpent = {};
          userT.filter(t => t.type === 'expense').forEach(t => {
            const cat = categories.find(c => c.id === t.categoryId)?.name || 'Other';
            categoriesSpent[cat] = (categoriesSpent[cat] || 0) + t.amount;
          });

          const labels = Object.keys(categoriesSpent);
          const data = Object.values(categoriesSpent);
          const colors = labels.map(label => {
            const cat = categories.find(c => c.name === label);
            return cat ? cat.color : '#71717a';
          });

          chartInstanceRef.current = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: labels.length > 0 ? labels : ['No Expenses Yet'],
              datasets: [{
                data: data.length > 0 ? data : [1],
                backgroundColor: data.length > 0 ? colors : ['#3f3f46'],
                borderWidth: 0,
                hoverOffset: 4
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    color: theme === 'dark' ? '#d4d4d8' : '#27272a',
                    font: {
                      family: 'Plus Jakarta Sans',
                      size: 11
                    }
                  }
                }
              },
              cutout: '70%'
            }
          });
        }
      }, [transactions, categories, currentUser, currentView, theme]);

      // --- INLINE SVG UTILS FOR ICON RENDER ---
      const renderIcon = (name, className = "w-5 h-5") => {
        const svgMap = {
          'shopping-bag': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
          'credit-card': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
          'user': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
          'map-pin': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
          'tag': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M7 7h.01M6 20h.01m0-14H18a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2z" /></svg>,
          'activity': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
          'book-open': <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,

                      <div className="flex items-center justify-between">
                        <div>
                          <h4 className="font-semibold">Simulated Biometrics Access</h4>
                          <p className="text-[10px] text-zinc-500">Allow users to log in with simulated FaceID scans.</p>
                        </div>
                        <input type="checkbox" checked={cmsSettings.enableBiometrics} onChange={(e) => setCmsSettings({ ...cmsSettings, enableBiometrics: e.target.checked })} className="w-4 h-4 rounded text-brand-500" />
                      </div>
                      
                      <div className="flex items-center justify-between">
                        <div>
                          <h4 className="font-semibold">Borrow & Lend Ledger</h4>
                          <p className="text-[10px] text-zinc-500">Enable borrowing and lending accounts tracker.</p>
                        </div>
                        <input type="checkbox" checked={cmsSettings.enableBorrowLend} onChange={(e) => setCmsSettings({ ...cmsSettings, enableBorrowLend: e.target.checked })} className="w-4 h-4 rounded text-brand-500" />
                      </div>

                      <div className="flex items-center justify-between">
                        <div>
                          <h4 className="font-semibold">Recurring Incomes/Expenses</h4>
                          <p className="text-[10px] text-zinc-500">Let users set recurring weekly or monthly transactions.</p>
                        </div>
                        <input type="checkbox" checked={cmsSettings.enableRecurring} onChange={(e) => setCmsSettings({ ...cmsSettings, enableRecurring: e.target.checked })} className="w-4 h-4 rounded text-brand-500" />
                      </div>

                      <div className="flex items-center justify-between">
                        <div>
                          <h4 className="font-semibold">Report Exporters</h4>
                          <p className="text-[10px] text-zinc-500">Enable direct file downloads for PDF and Excel CSV.</p>
                        </div>
                        <input type="checkbox" checked={cmsSettings.enableExport} onChange={(e) => setCmsSettings({ ...cmsSettings, enableExport: e.target.checked })} className="w-4 h-4 rounded text-brand-500" />
                      </div>
                    </div>
                  </div>

                  {/* Banner alerts copy setup */}
                  <div className="glassmorphism p-5 rounded-2xl border flex flex-col justify-between">
                    <div className="space-y-4">
                      <h3 className="font-semibold text-sm border-b border-zinc-200 dark:border-zinc-800 pb-2">Dashboard System Alert Banner</h3>
                      
                      <div className="space-y-3 text-xs">
                        <div className="flex items-center gap-2">
                          <input type="checkbox" checked={cmsSettings.showDashboardBanner} onChange={(e) => setCmsSettings({ ...cmsSettings, showDashboardBanner: e.target.checked })} />
                          <label className="font-semibold">Display banner on User Dashboard</label>
                        </div>
                        <div>
                          <label className="block text-zinc-400 mb-1 font-semibold">Banner Message Copy</label>
                          <textarea 
                            value={cmsSettings.dashboardBannerText} 
                            onChange={(e) => setCmsSettings({ ...cmsSettings, dashboardBannerText: e.target.value })}
                            rows="3" 
                            className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2 outline-none text-xs"
                          ></textarea>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Currencies exchange rate setup */}
                  <div className="glassmorphism p-5 rounded-2xl border space-y-4">
                    <h3 className="font-semibold text-sm border-b border-zinc-200 dark:border-zinc-800 pb-2">Currencies exchange relative to USD</h3>
                    
                    <div className="space-y-3.5 text-xs max-h-48 overflow-y-auto">
                      {cmsSettings.currencies.map(curr => (
                        <div key={curr.code} className="flex items-center justify-between">
                          <span className="font-bold">{curr.code} ({curr.symbol})</span>
                          <input 
                            type="number" 
                            step="0.01" 
                            value={curr.rate} 
                            onChange={(e) => {
                              const updated = cmsSettings.currencies.map(cu => cu.code === curr.code ? { ...cu, rate: parseFloat(e.target.value) || 1 } : cu);
                              setCmsSettings({ ...cmsSettings, currencies: updated });
                            }}
                            className="w-24 bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded px-2 py-1 text-xs outline-none"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* System category managers and user list */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  {/* Category editor */}
                  <div className="glassmorphism p-5 rounded-2xl border lg:col-span-2 space-y-4">
                    <h3 className="font-semibold text-sm border-b border-zinc-200 dark:border-zinc-800 pb-2">Global System Categories</h3>
                    
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs">
                      {categories.map(cat => (
                        <div key={cat.id} className="p-3 rounded-lg border border-zinc-200 dark:border-zinc-800 flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <span className="w-3.5 h-3.5 rounded-full" style={{ backgroundColor: cat.color }}></span>
                            <span className="font-medium">{cat.name}</span>
                          </div>
                          <button 
                            onClick={() => setCategories(categories.filter(c => c.id !== cat.id))}
                            className="text-rose-500 hover:text-rose-700"
                          >
                            &times;
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Simulation User DB */}
                  <div className="glassmorphism p-5 rounded-2xl border space-y-4">
                    <h3 className="font-semibold text-sm border-b border-zinc-200 dark:border-zinc-800 pb-2">Active Profiles DB</h3>
                    
                    <div className="divide-y divide-zinc-200 dark:divide-zinc-800">
                      {users.map(u => (
                        <div key={u.id} className="py-2.5 flex items-center justify-between text-xs">
                          <div>
                            <h5 className="font-semibold">{u.name}</h5>
                            <p className="text-[10px] text-zinc-500">{u.email}</p>
                          </div>
                          <span className={`px-2 py-0.5 rounded text-[10px] uppercase font-bold tracking-wider ${u.role === 'admin' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/20' : 'bg-brand-500/10 text-brand-500 border border-brand-500/20'}`}>
                            {u.role}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

              </div>
            )}

          </main>

          {/* --- MODAL DIALOGS --- */}

          {/* TRANSACTION ADD MODAL */}
          {showAddTransactionModal && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
              <div className="w-full max-w-md bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl p-6 text-xs text-zinc-800 dark:text-zinc-200">
                <div className="flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800 pb-3 mb-4">
                  <h3 className="text-sm font-bold font-display">New Ledger Transaction Entry</h3>
                  <button onClick={() => setShowAddTransactionModal(false)} className="text-zinc-500 hover:text-zinc-700 font-bold">&times;</button>
                </div>
                
                <form onSubmit={handleAddTransaction} className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Type</label>
                      <select name="type" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Amount (USD)</label>
                      <input required type="number" step="0.01" name="amount" placeholder="0.00" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none font-bold" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Category</label>
                      <select name="categoryId" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none">
                        {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Date</label>
                      <input required type="date" name="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Family Sync</label>
                      <select name="familyMember" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none">
                        {currentUser.familyMembers?.map(m => <option key={m} value={m}>{m}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Tags (comma separated)</label>
                      <input type="text" name="tags" placeholder="Food, Dinner, Grocery" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-zinc-400 mb-1 font-semibold">Notes</label>
                    <textarea name="notes" placeholder="Detailed description..." rows="2" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2 outline-none"></textarea>
                  </div>

                  {cmsSettings.enableRecurring && (
                    <div className="p-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700 space-y-2">
                      <div className="flex items-center gap-2">
                        <input type="checkbox" id="isRecurring" name="isRecurring" />
                        <label htmlFor="isRecurring" className="font-semibold">Setup as Recurring Transaction</label>
                      </div>
                      <div>
                        <select name="frequency" className="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded p-1.5 outline-none">
                          <option value="weekly">Weekly</option>
                          <option value="monthly">Monthly</option>
                          <option value="yearly">Yearly</option>
                        </select>
                      </div>
                    </div>
                  )}

                  <div className="pt-2 flex justify-end gap-2">
                    <button type="button" onClick={() => setShowAddTransactionModal(false)} className="px-4 py-2 bg-zinc-200 dark:bg-zinc-850 hover:bg-zinc-300 dark:hover:bg-zinc-800 text-zinc-850 dark:text-zinc-200 rounded-lg">Cancel</button>
                    <button type="submit" className="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg shadow transition">Post Transaction</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* BUDGET CONFIGURE MODAL */}
          {showAddBudgetModal && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="w-full max-w-sm bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl p-6 text-xs text-zinc-800 dark:text-zinc-200">
                <div className="flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800 pb-3 mb-4">
                  <h3 className="text-sm font-bold font-display">Configure Budget Cap</h3>
                  <button onClick={() => setShowAddBudgetModal(false)} className="text-zinc-500 hover:text-zinc-700 font-bold">&times;</button>
                </div>
                
                <form onSubmit={handleAddBudget} className="space-y-4">
                  <div>
                    <label className="block text-zinc-400 mb-1 font-semibold">Select Category</label>
                    <select name="categoryId" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none">
                      {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-zinc-400 mb-1 font-semibold">Limit Amount (USD)</label>
                    <input required type="number" name="limitAmount" placeholder="0.00" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none font-bold" />
                  </div>

                  <div className="pt-2 flex justify-end gap-2">
                    <button type="button" onClick={() => setShowAddBudgetModal(false)} className="px-4 py-2 bg-zinc-200 dark:bg-zinc-850 hover:bg-zinc-300 dark:hover:bg-zinc-800 text-zinc-850 dark:text-zinc-200 rounded-lg">Cancel</button>
                    <button type="submit" className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg transition">Apply limit</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* LOAN RECORD MODAL */}
          {showAddLoanModal && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="w-full max-w-sm bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl p-6 text-xs text-zinc-800 dark:text-zinc-200">
                <div className="flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800 pb-3 mb-4">
                  <h3 className="text-sm font-bold font-display">Record Loan Ledger</h3>
                  <button onClick={() => setShowAddLoanModal(false)} className="text-zinc-500 hover:text-zinc-700 font-bold">&times;</button>
                </div>
                
                <form onSubmit={handleAddLoan} className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Loan Type</label>
                      <select name="type" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none">
                        <option value="lend">Lend (Give to Collect)</option>
                        <option value="borrow">Borrow (Receive to Pay)</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-zinc-400 mb-1 font-semibold">Amount (USD)</label>
                      <input required type="number" name="amount" placeholder="0.00" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none font-bold" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-zinc-400 mb-1 font-semibold">Person Name</label>
                    <input required type="text" name="personName" placeholder="e.g. Sam Johnson" className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none" />
                  </div>

                  <div>
                    <label className="block text-zinc-400 mb-1 font-semibold">Due Date</label>
                    <input required type="date" name="dueDate" defaultValue={new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]} className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none" />
                  </div>

                  <div>
                    <label className="block text-zinc-400 mb-1 font-semibold">Notes</label>
                    <textarea name="notes" placeholder="Splitting dinner, rental helper..." className="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg p-2.5 outline-none"></textarea>
                  </div>

                  <div className="pt-2 flex justify-end gap-2">
                    <button type="button" onClick={() => setShowAddLoanModal(false)} className="px-4 py-2 bg-zinc-200 dark:bg-zinc-850 hover:bg-zinc-300 dark:hover:bg-zinc-800 text-zinc-850 dark:text-zinc-200 rounded-lg">Cancel</button>
                    <button type="submit" className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg transition">Apply Record</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* PDF EXPORT PRINT PREVIEW DIALOG */}
          {showPrintModal && (
            <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="w-full max-w-2xl bg-white text-zinc-900 rounded-2xl shadow-2xl p-6 text-xs">
                <div className="flex justify-between items-center border-b border-zinc-200 pb-3 mb-4">
                  <h3 className="text-sm font-bold text-zinc-800">Printable Financial Ledger Report</h3>
                  <button onClick={() => setShowPrintModal(false)} className="text-zinc-500 hover:text-zinc-700 font-bold">&times;</button>
                </div>
                
                {/* Print area */}
                <div className="border border-zinc-200 p-6 rounded-xl space-y-6 bg-white" id="printable-report">
                  <div className="flex justify-between items-start">
                    <div>
                      <h2 className="text-lg font-bold">APEXFINANCE LEDGER SUMMARY</h2>
                      <p className="text-[10px] text-zinc-500">Report generated for {currentUser.name} on {new Date().toLocaleDateString()}</p>
                    </div>
                    <span className="text-sm font-bold text-brand-600">PREMIUM</span>
                  </div>

                  <div className="grid grid-cols-3 gap-4 border-y border-zinc-100 py-4 text-center">
                    <div>
                      <h4 className="text-[10px] text-zinc-400 uppercase">Total Incomes</h4>
                      <p className="text-base font-bold text-emerald-600">{formatVal(stats.income)}</p>
                    </div>
                    <div>
                      <h4 className="text-[10px] text-zinc-400 uppercase">Total Expenses</h4>
                      <p className="text-base font-bold text-rose-600">{formatVal(stats.expenses)}</p>
                    </div>
                    <div>
                      <h4 className="text-[10px] text-zinc-400 uppercase">Computed Savings</h4>
                      <p className="text-base font-bold text-brand-600">{formatVal(stats.savings)}</p>
                    </div>
                  </div>

                  <div className="space-y-2">
                    <h4 className="font-semibold text-zinc-700">Detailed Statement</h4>
                    <table className="w-full text-left text-[10px]">
                      <thead>
                        <tr className="border-b border-zinc-200 text-zinc-400 font-semibold">
                          <th className="py-1.5">Type</th>
                          <th className="py-1.5">Date</th>
                          <th className="py-1.5">Category</th>
                          <th className="py-1.5">Notes</th>
                          <th className="py-1.5 text-right">Amount</th>
                        </tr>
                      </thead>
                      <tbody>
                        {transactions.filter(t => t.userId === currentUser.id).map(t => {
                          const cat = categories.find(c => c.id === t.categoryId)?.name || 'Other';
                          return (
                            <tr key={t.id} className="border-b border-zinc-100">
                              <td className="py-1.5 capitalize font-semibold">{t.type}</td>
                              <td className="py-1.5 text-zinc-500">{t.date}</td>
                              <td className="py-1.5">{cat}</td>
                              <td className="py-1.5 text-zinc-600">{t.notes}</td>
                              <td className="py-1.5 text-right font-bold">{formatVal(t.amount)}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                <div className="pt-4 flex justify-end gap-2">
                  <button onClick={() => setShowPrintModal(false)} className="px-4 py-2 bg-zinc-100 hover:bg-zinc-205 text-zinc-800 rounded-lg">Close</button>
                  <button onClick={() => window.print()} className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg shadow">Print Document</button>
                </div>
              </div>
            </div>
          )}

          {renderBottomNav()}
        </div>
      );
    }

    // Render the React application
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
